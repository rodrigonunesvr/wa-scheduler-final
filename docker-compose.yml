version: '3.3'
services:
  evolution-api:
    image: atendimentos/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_ENV=true
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=insira_uma_chave_segura_aqui
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_instances:
